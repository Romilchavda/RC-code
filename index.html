<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Python IDE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #121212; color: #fff; overflow: hidden; }

        /* App Bar */
        .app-bar { background-color: #1E1E1E; height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.4); z-index: 20; position: relative; }
        .app-title { display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 500; }
        
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        
        .btn-run { background-color: #00E676; color: #000; border: none; height: 36px; padding: 0 16px; border-radius: 18px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 4px rgba(0,230,118,0.3); }
        .btn-run:disabled { background-color: #333; color: #888; box-shadow: none; }

        /* Sidebar (Drawer) */
        .sidebar { position: fixed; left: -280px; top: 56px; width: 280px; height: calc(100vh - 56px); background-color: #1A1A1A; z-index: 15; transition: 0.3s ease; display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar.open { left: 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 14; display: none; top: 56px; }
        .overlay.open { display: block; }

        /* File Explorer */
        .sidebar-section { padding: 15px; border-bottom: 1px solid #333; }
        .section-title { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .add-file-btn { background: none; border: none; color: #00B0FF; font-size: 16px; cursor: pointer; }
        
        .file-list { list-style: none; }
        .file-item { padding: 8px 10px; border-radius: 6px; margin-bottom: 5px; cursor: pointer; color: #ccc; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .file-item:hover { background-color: #2A2A2A; }
        .file-item.active { background-color: #00B0FF22; color: #00B0FF; border-left: 3px solid #00B0FF; }

        /* GitHub Sync Area */
        .gh-input { width: 100%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: 1px solid #444; background: #222; color: #fff; font-size: 13px; outline: none; }
        .gh-input:focus { border-color: #00B0FF; }
        .btn-sync { width: 100%; background: #238636; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .btn-sync:hover { background: #2ea043; }

        /* Editor & Console */
        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #editor-container { flex: 1; width: 100%; background-color: #121212; padding-top: 5px; }
        .file-tabs { display: flex; background: #1E1E1E; padding: 5px 10px 0; gap: 5px; border-bottom: 1px solid #333; overflow-x: auto; }
        .tab { padding: 8px 15px; background: #2D2D2D; border-radius: 6px 6px 0 0; font-size: 13px; color: #aaa; cursor: pointer; white-space: nowrap; }
        .tab.active { background: #121212; color: #fff; border-top: 2px solid #00B0FF; }

        .console-wrapper { height: 35%; display: flex; flex-direction: column; background-color: #000; border-top: 1px solid #333; }
        .console-header { background-color: #1E1E1E; display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; border-bottom: 1px solid #222; }
        #terminal-output { flex: 1; padding: 12px 16px; overflow-y: auto; font-family: monospace; font-size: 13px; color: #E0E0E0; white-space: pre-wrap; word-wrap: break-word; }
        
        .text-sys { color: #00B0FF; }
        .text-err { color: #FF5252; }
        .text-succ { color: #00E676; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="app-bar">
        <div class="app-title">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <span>Python Pro</span>
        </div>
        <button id="runBtn" class="btn-run" onclick="runCode()" disabled>⏳ Loading...</button>
    </header>

    <!-- Sidebar & Overlay -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <!-- File Explorer -->
        <div class="sidebar-section" style="flex: 1; overflow-y: auto;">
            <div class="section-title">
                <span>Explorer</span>
                <button class="add-file-btn" onclick="addNewFile()">+ Add</button>
            </div>
            <ul class="file-list" id="fileList"></ul>
        </div>

        <!-- GitHub Integration -->
        <div class="sidebar-section">
            <div class="section-title">☁️ GitHub Sync</div>
            <input type="text" id="gh-owner" class="gh-input" placeholder="GitHub Username (e.g. Romilchavda)">
            <input type="text" id="gh-repo" class="gh-input" placeholder="Repo Name (e.g. my-project)">
            <input type="password" id="gh-token" class="gh-input" placeholder="Personal Access Token (PAT)">
            <button class="btn-sync" onclick="pushToGitHub()">🚀 Push to GitHub</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-area">
        <div class="file-tabs" id="fileTabs"></div>
        <div id="editor-container"></div>
    </div>

    <!-- Console -->
    <div class="console-wrapper">
        <div class="console-header">
            <span style="font-size: 12px; color: #aaa; text-transform: uppercase; font-weight: bold;">Output</span>
            <button style="background:none; border:none; color:#888; font-size:12px; cursor:pointer; font-weight:bold;" onclick="document.getElementById('terminal-output').innerHTML=''">CLEAR</button>
        </div>
        <div id="terminal-output">
            <div class="text-sys">Initializing Pyodide Virtual Engine (~10MB)...</div>
        </div>
    </div>

    <script>
        // Default Files
        let files = {
            "main.py": "from utils import greet\n\nprint('Starting Project...')\nprint(greet('Developer'))\n",
            "utils.py": "def greet(name):\n    return f'Hello {name}, Welcome to the Pro Web IDE! 🚀'\n"
        };
        let currentFile = "main.py";
        let monacoModels = {};

        const terminal = document.getElementById("terminal-output");
        const runBtn = document.getElementById("runBtn");

        function printTerm(msg, type = "") {
            const div = document.createElement("div");
            div.textContent = msg; 
            div.className = type;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // --- UI Interactions ---
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }

        function renderUI() {
            const fileList = document.getElementById('fileList');
            const fileTabs = document.getElementById('fileTabs');
            fileList.innerHTML = ''; 
            fileTabs.innerHTML = '';

            Object.keys(files).forEach(filename => {
                // Sidebar item
                let li = document.createElement('li');
                li.className = `file-item ${filename === currentFile ? 'active' : ''}`;
                li.innerHTML = `📄 ${filename}`;
                li.onclick = () => switchFile(filename);
                fileList.appendChild(li);

                // Tab item
                let tab = document.createElement('div');
                tab.className = `tab ${filename === currentFile ? 'active' : ''}`;
                tab.innerText = filename;
                tab.onclick = () => switchFile(filename);
                fileTabs.appendChild(tab);
            });
        }

        function addNewFile() {
            let name = prompt("Enter new file name (e.g., script.py):");
            if (name && !files[name]) {
                if(!name.endsWith('.py')) name += '.py';
                files[name] = "# New python file\n";
                monacoModels[name] = monaco.editor.createModel(files[name], 'python');
                switchFile(name);
            }
        }

        function switchFile(filename) {
            if (monacoModels[currentFile]) {
                files[currentFile] = editor.getValue();
            }
            currentFile = filename;
            editor.setModel(monacoModels[filename]);
            renderUI();
            
            // Close sidebar if on mobile
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        // --- Init Monaco Editor ---
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        let editor;
        require(['vs/editor/editor.main'], function() {
            monaco.editor.defineTheme('androidDark', { base: 'vs-dark', inherit: true, rules:[], colors: { 'editor.background': '#121212', 'editor.lineHighlightBackground': '#00000000' } });

            Object.keys(files).forEach(filename => {
                monacoModels[filename] = monaco.editor.createModel(files[filename], 'python');
            });

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                model: monacoModels[currentFile],
                theme: 'androidDark', automaticLayout: true, wordWrap: 'on', minimap: { enabled: false },
                lineNumbersMinChars: 3, renderLineHighlight: "none", fontSize: 14, contextmenu: false
            });
            renderUI();
        });

        // --- Init Pyodide ---
        let pyodideReadyPromise;
        async function initPyodide() {
            try {
                let pyodide = await loadPyodide({
                    indexURL: "https://cdn.jsdelivr.net/pyodide/v0.24.1/full/", // Fixed Engine Loading URL
                    stdout: (text) => printTerm(text),
                    stderr: (text) => printTerm(text, "text-err")
                });
                printTerm("✔ Python Engine Ready! You can run code now.", "text-succ");
                runBtn.innerHTML = "▶ RUN"; 
                runBtn.disabled = false;
                return pyodide;
            } catch(e) { 
                printTerm("❌ Error loading Pyodide. Check internet.", "text-err"); 
                console.error(e);
            }
        }
        pyodideReadyPromise = initPyodide();

        // --- Run Code (Multi-file Support) ---
        async function runCode() {
            runBtn.innerHTML = "⏳ RUNNING"; 
            runBtn.disabled = true;
            runBtn.style.backgroundColor = "#FFD600";
            
            printTerm(`\n> Executing main.py...`, "text-sys");

            files[currentFile] = editor.getValue();

            try {
                let pyodide = await pyodideReadyPromise;
                
                // Write all files to virtual system
                for (const [name, content] of Object.entries(files)) {
                    pyodide.FS.writeFile(name, content);
                }

                // Run main.py
                await pyodide.runPythonAsync(files['main.py']);
            } catch (err) {
                printTerm(err.toString(), "text-err");
            }
            runBtn.innerHTML = "▶ RUN"; 
            runBtn.disabled = false;
            runBtn.style.backgroundColor = "#00E676";
        }

        // --- GITHUB INTEGRATION (DIRECT PUSH) ---
        async function pushToGitHub() {
            const owner = document.getElementById('gh-owner').value.trim();
            const repo = document.getElementById('gh-repo').value.trim();
            const token = document.getElementById('gh-token').value.trim();

            if (!owner || !repo || !token) {
                alert("Please fill all GitHub details in the sidebar!");
                return;
            }

            printTerm(`\n> Syncing to GitHub (${owner}/${repo})...`, "text-sys");
            
            // Close sidebar
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');

            files[currentFile] = editor.getValue();

            // Iterate over all files and push
            for (const [filename, content] of Object.entries(files)) {
                printTerm(`Uploading ${filename}...`);
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${filename}`;
                
                try {
                    let sha = null;
                    const getRes = await fetch(apiUrl, { headers: { 'Authorization': `token ${token}` } });
                    if (getRes.ok) {
                        const data = await getRes.json();
                        sha = data.sha; // Needed to update existing files
                    }

                    // Convert to base64 properly handling special characters
                    const contentBase64 = btoa(unescape(encodeURIComponent(content))); 
                    const bodyData = {
                        message: `Update ${filename} via Mobile IDE`,
                        content: contentBase64
                    };
                    if (sha) bodyData.sha = sha;

                    const putRes = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(bodyData)
                    });

                    if (putRes.ok) {
                        printTerm(`✔ ${filename} pushed successfully!`, "text-succ");
                    } else {
                        const errData = await putRes.json();
                        printTerm(`❌ Failed ${filename}: ${errData.message}`, "text-err");
                    }
                } catch (error) {
                    printTerm(`❌ Error on ${filename}: ${error.message}`, "text-err");
                }
            }
            printTerm("✔ GitHub Sync Complete!", "text-sys");
        }
    </script>
</body>
</html>
