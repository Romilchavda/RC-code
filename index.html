<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RC Code Editor</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="assets/style.css">
    
    <!-- Premium Fonts & VS Code Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://microsoft.github.io/vscode-codicons/dist/codicon.css" rel="stylesheet">
    
    <!-- 🚨 JSZip KO SABSE UPAR RAKHNA HAI (Download Fix) 🚨 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <!-- Uske baad Monaco aur baaki sab -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/standalone.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/parser-html.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/parser-css.js"></script>
    <script src="https://unpkg.com/prettier@2.8.8/parser-babel.js"></script>
</head>

<body>
    
    <!-- Premium Custom Modal (Popup) -->
    <div class="modal-overlay" id="custom-modal">
        <div class="modal-box">
            <div class="modal-header" id="modal-title">Title</div>
            <div class="modal-body">
                <input type="text" id="modal-input" class="modal-input" placeholder="Enter Name or Path" autocomplete="off">
                <p id="modal-message" class="modal-message"></p>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-confirm" id="modal-confirm-btn">Confirm</button>
            </div>
        </div>
    </div>
    
    <!-- 🚀 NEW: CUSTOM SNIPPET MANAGER MODAL -->
    <div class="modal-overlay" id="snippet-modal">
        <div class="modal-box" style="width: 90%; max-width: 500px;">
            <div class="modal-header">Manage Custom Snippets</div>
            <div class="modal-body" style="text-align: left;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="snip-lang" class="modal-input" style="width: 40%; padding: 8px;">
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                    <input type="text" id="snip-trigger" class="modal-input" style="width: 60%;" placeholder="Shortcut (e.g. ! or clg)">
                </div>
                <textarea id="snip-code" class="modal-input" style="height: 120px; resize: vertical; font-family: monospace;" placeholder="Enter your code here...\nUse $1, $2 to set cursor positions."></textarea>
                
                <button class="btn-confirm" onclick="saveCustomSnippet()" style="width: 100%; margin-top: 10px; margin-bottom: 15px;">Save Snippet</button>
                
                <div style="border-top: 1px solid #444; padding-top: 10px;">
                    <strong style="color: #ccc; font-size: 14px;">Your Saved Snippets:</strong>
                    <div id="snippet-list" style="max-height: 150px; overflow-y: auto; margin-top: 10px; font-size: 13px;">
                        <!-- List of snippets will appear here -->
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeSnippetManager()">Close</button>
            </div>
        </div>
    </div>
    
    <!-- Mobile Sidebar Overlay -->
    <div class="mobile-overlay" id="mobile-overlay" onclick="toggleSidebar()"></div>
    
    <!-- Top Header -->
    <header class="header">
        <div class="brand">
            <i class="codicon codicon-menu menu-btn" onclick="toggleSidebar()"></i>
            <span class="brand-title">RC Code</span>
        </div>
        <div class="header-actions">
            <span class="shortcut-hint">Ctrl + S to Run</span>
            <button id="runBtn" class="btn-run" onclick="runCode()" disabled>
                <i class="codicon codicon-play"></i> Loading...
            </button>
        </div>
    </header>
    
    <div class="app-body">
        <!-- Activity Bar -->
        <div class="activity-bar" id="activity-bar">
            <div class="act-top">
                <i class="codicon codicon-files active" title="Explorer"></i>
                <!-- 🚀 NEW: SNIPPET MANAGER BUTTON -->
                <i class="codicon codicon-symbol-snippet icon-btn" onclick="openSnippetManager()" title="Custom Snippets" style="margin-top: 15px; cursor: pointer; color: #8b949e;"></i>
            </div>
            <div class="act-bottom"></div>
        </div>
        
        <!-- Sidebar (Explorer) -->
        <div class="sidebar" id="sidebar">
            <div class="section-header">
                <span>EXPLORER</span>
                <div class="actions">
                    <i class="codicon codicon-new-file icon-btn" onclick="addNewFile()" title="New File"></i>
                    <i class="codicon codicon-new-folder icon-btn" onclick="addNewFolder()" title="New Folder"></i>
                    <i class="codicon codicon-cloud-upload icon-btn" onclick="document.getElementById('file-upload').click()" title="Upload Files"></i>
                    <i class="codicon codicon-archive icon-btn" onclick="downloadProject()" title="Download ZIP"></i>
                </div>
            </div>
            <!-- Hidden File Input for Upload -->
            <input type="file" id="file-upload" multiple style="display: none;" onchange="uploadFiles(event)">
            
            <div class="file-tree" id="fileTree"></div>
        </div>
        
        <!-- Vertical Resizer -->
        <div class="resizer-v" id="resizer-v"></div>
        
        <!-- Main Workspace -->
        <div class="main-workspace">
            <div class="tabs-container" id="fileTabs"></div>
            <div id="editor-container"></div>
            
            <!-- Horizontal Resizer -->
            <div class="resizer-h" id="resizer-h"></div>
            
            <!-- Terminal / Output -->
            <div class="terminal-container" id="terminal-container">
                <div class="terminal-tabs">
                    <div class="term-tab active" id="output-title">TERMINAL</div>
                    <div class="term-actions">
                        <i class="codicon codicon-paintcan icon-btn" onclick="formatCode()" title="Format Code (Alt+Shift+F)"></i>
                        <i class="codicon codicon-link-external icon-btn hidden" id="btn-external" onclick="openPreviewInNewTab()" title="Open Preview in New Tab"></i>
                        <i class="codicon codicon-clear-all icon-btn" onclick="clearOutput()" title="Clear Output (Ctrl+L)"></i>
                        <i class="codicon codicon-chevron-down icon-btn" onclick="minimizeTerminal()" title="Minimize"></i>
                    </div>
                </div>
                <div id="terminal-output"></div>
                <iframe id="web-preview" class="hidden"></iframe>
            </div>
        </div>
    </div>
    
    <!-- Status Bar -->
    <footer class="status-bar">
        <div class="status-left">
            <span id="pyodide-status"><i class="codicon codicon-sync codicon-modifier-spin"></i> Loading...</span>
        </div>
        <div class="status-right">
            <span id="cursor-position">Ln 1, Col 1</span>
            <span id="current-language">Python</span>
        </div>
    </footer>
    
    <!-- 3 Files mein divided scripts -->
    <script src="assets/system.js"></script>
    <script src="assets/snippets.js"></script>
    <script src="assets/app.js"></script>
</body>

</html>
</body>

</html>
